version: '3.8'

services:
  neo4j:
    image: neo4j:5.13
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    networks:
      - graphrag-network

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - graphrag-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - graphrag-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-graphrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: graphrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - graphrag-network

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: api-service
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-graphrag}:${POSTGRES_PASSWORD}@postgres:5432/graphrag
    depends_on:
      - neo4j
      - qdrant
      - redis
      - postgres
    networks:
      - graphrag-network

  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    container_name: ingestion-service
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - graphrag-network

  graph-service:
    build:
      context: ./services/graph-service
      dockerfile: Dockerfile
    container_name: graph-service
    env_file:
      - .env
    ports:
      - "8002:8002"
    environment:
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      - neo4j
    networks:
      - graphrag-network

  retrieval-service:
    build:
      context: ./services/retrieval-service
      dockerfile: Dockerfile
    container_name: retrieval-service
    env_file:
      - .env
    ports:
      - "8003:8003"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    networks:
      - graphrag-network

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: agent-service
    env_file:
      - .env
    ports:
      - "8004:8004"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - neo4j
      - qdrant
      - retrieval-service
    networks:
      - graphrag-network

  evaluation-service:
    build:
      context: ./services/evaluation-service
      dockerfile: Dockerfile
    container_name: evaluation-service
    env_file:
      - .env
    ports:
      - "8005:8005"
    depends_on:
      - postgres
    networks:
      - graphrag-network

volumes:
  neo4j_data:
  qdrant_storage:
  redis_data:
  postgres_data:

networks:
  graphrag-network:
    driver: bridge